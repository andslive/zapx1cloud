# /etc/nginx/sites-available/edge.x1zap.cloud
# Após copiar:
#   ln -sf /etc/nginx/sites-available/edge.x1zap.cloud /etc/nginx/sites-enabled/edge.x1zap.cloud
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d edge.x1zap.cloud --redirect --non-interactive --agree-tos -m ops@x1zap.cloud

limit_req_zone $binary_remote_addr zone=edge_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=edge_hook:10m rate=200r/s;

server {
    listen 80;
    listen [::]:80;
    server_name edge.x1zap.cloud;

    # Certbot fará o upgrade para HTTPS automaticamente; até lá responde health em HTTP.
    location /health {
        proxy_pass http://127.0.0.1:8787/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /webhooks/ {
        limit_req zone=edge_hook burst=400 nodelay;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12m;
    }

    location /wa/ {
        limit_req zone=edge_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12m;
    }

    location / {
        return 404;
    }
}
